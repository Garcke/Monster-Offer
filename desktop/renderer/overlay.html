<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting-Monster Overlay</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="overlay.css?v=cluely-overlay-20260716">
    <script src="https://cdn.bootcdn.net/ajax/libs/marked/4.3.0/marked.min.js"></script>
</head>

<body>
<div id="overlayRoot" class="overlay-root is-capsule">
    <header class="overlay-header">
        <div class="overlay-drag-region">
            <img class="overlay-logo" src="favicon.png" alt="">
            <div class="overlay-live-state">
                <span id="overlayLiveDot" class="overlay-live-dot" aria-hidden="true"></span>
                <span id="overlayStatusText">就绪</span>
            </div>
        </div>
        <div class="overlay-actions">
            <button id="capsuleProtectionToggle" class="overlay-button protection-button" type="button" aria-pressed="true" aria-label="关闭窗口保护">保护中</button>
            <button id="floatingExpandButton" class="overlay-button expand-button" type="button" aria-label="展开工作台" aria-expanded="false">展开 <span aria-hidden="true">⌄</span></button>
            <button id="floatingHideButton" class="overlay-button hide-button" type="button" aria-label="隐藏悬浮窗">■</button>
        </div>
    </header>

    <main id="overlayPanel" class="overlay-panel" aria-live="polite">
        <section class="overlay-conversation">
            <div class="overlay-question-prompt">
                <span class="prompt-icon" aria-hidden="true">✦</span>
                <span id="overlayPromptLabel">What should I say?</span>
            </div>

            <div id="overlayTranscript" class="overlay-transcript">
                <div class="overlay-empty-state">开始转写后，当前问题会显示在这里</div>
            </div>

            <nav class="overlay-tool-row" aria-label="回答操作">
                <button id="overlayAssistButton" class="overlay-tool-button is-active" type="button">✦ Assist</button>
                <button id="overlayFollowupButton" class="overlay-tool-button" type="button" disabled>⌁ 追问</button>
                <button id="overlayRecapButton" class="overlay-tool-button" type="button" disabled>↻ 重述</button>
                <span id="overlayQuestionCount" class="overlay-count">0 条</span>
            </nav>
        </section>

        <section class="overlay-answer-section">
            <div class="overlay-answer-heading">
                <span class="answer-kicker">AI REPLY</span>
                <span id="overlayAnswerStatus" class="answer-status">等待问题</span>
            </div>
            <div id="overlayAnswer" class="overlay-answer">
                <div class="overlay-answer-empty">选择一个问题后，点击 Assist 生成回答</div>
            </div>
        </section>

        <form id="overlayComposer" class="overlay-composer">
            <textarea id="overlayInput" rows="1" placeholder="Ask about your screen or conversation…" aria-label="输入面试问题"></textarea>
            <div class="overlay-composer-footer">
                <div class="overlay-composer-actions">
                    <button id="overlayStartButton" class="overlay-small-button start-button" type="button"><span class="record-dot" aria-hidden="true"></span>开始转写</button>
                    <button id="overlayStopButton" class="overlay-small-button stop-button" type="button" disabled>停止</button>
                    <button id="overlayClearButton" class="overlay-small-button quiet-button" type="button">清空</button>
                </div>
                <div class="overlay-submit-actions">
                    <span class="keyboard-hint">Ctrl + Enter</span>
                    <button id="overlayCopyButton" class="overlay-small-button quiet-button" type="button" disabled>复制</button>
                    <button id="overlayAnswerButton" class="overlay-submit-button" type="submit">➜</button>
                </div>
            </div>
        </form>
    </main>
</div>

<script type="module" src="overlay.js?v=cluely-overlay-20260716"></script>
</body>

</html>
