<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f5f7fb">
    <title>Meeting-Monster</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.6.0/styles/github-dark.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.6.0/highlight.min.js"></script>
</head>

<body>
<div id="privacyRedactionShield" class="privacy-redaction-shield hidden" role="status" aria-live="polite">
    <span class="privacy-shield-icon" aria-hidden="true">◆</span>
    <strong>隐私保护中</strong>
    <span>转写和 AI 回答已暂时隐藏</span>
    <button id="privacyShieldToggle" class="button button-primary button-small" type="button">恢复显示</button>
</div>
<main class="app-shell" data-active-panel="interview">
    <header class="app-header">
        <div class="brand-block">
            <img class="brand-logo" src="favicon.png" alt="">
            <div>
                <p class="eyebrow">INTERVIEW COPILOT</p>
                <h1>Meeting-Monster</h1>
            </div>
        </div>
        <div class="header-actions">
            <div class="privacy-controls" aria-live="polite">
                <span id="privacyStatusBadge" class="privacy-status hidden"></span>
                <button id="privacyToggleButton" class="button button-quiet button-small hidden" type="button">开启脱敏</button>
            </div>
            <div id="recordingStatus" class="status-pill status-ready" aria-live="polite">
                <span class="status-dot" aria-hidden="true"></span>
                <span id="recordingStatusText">准备就绪</span>
            </div>
            <button id="saveTXTButton" class="button button-quiet" type="button">导出对话</button>
            <span id="modelStatus" class="model-status" title="模型由服务端配置">服务端模型 · 加载中</span>
        </div>
    </header>

    <nav id="mobileTabs" class="mobile-tabs" aria-label="工作区切换">
        <button class="mobile-tab is-active" type="button" data-panel="interview" aria-selected="true">面试内容</button>
        <button class="mobile-tab" type="button" data-panel="answer" aria-selected="false">AI 回答</button>
    </nav>

    <div class="workspace-grid">
        <section id="interviewPane" class="workspace-pane interview-pane" aria-labelledby="transcriptTitle">
            <div class="pane-heading">
                <div>
                    <div class="heading-line">
                        <h2 id="transcriptTitle">面试内容</h2>
                        <span id="questionCount" class="count-badge">0</span>
                    </div>
                    <p>语音会按句整理，选择问题后生成回答。</p>
                </div>
                <span class="local-badge">本地识别</span>
            </div>

            <div id="transcriptList" class="transcript-list" aria-live="polite">
                <div id="transcriptEmptyState" class="empty-state compact-empty">
                    <span class="empty-state-icon" aria-hidden="true">◌</span>
                    <h3>等待面试内容</h3>
                    <p>点击下方“开始转写”，识别结果会按句出现在这里。</p>
                </div>
            </div>

            <div class="interview-controls">
                <div class="record-toolbar">
                    <button id="startButton" class="button button-record" type="button" title="快捷键 A">
                        <span class="record-icon" aria-hidden="true"></span>
                        开始转写
                    </button>
                    <button id="stopButton" class="button button-stop" type="button" disabled title="快捷键 A">
                        <span class="stop-icon" aria-hidden="true"></span>
                        停止转写
                    </button>
                    <button id="clearButton" class="button button-quiet" type="button" title="快捷键 C">清空</button>
                </div>

                <div class="manual-composer">
                    <label class="sr-only" for="manualInput">手动输入面试问题</label>
                    <textarea id="manualInput" rows="2" placeholder="语音识别不准确时，可在这里手动输入问题……"></textarea>
                    <div class="composer-footer">
                        <span>Ctrl + Enter 发送</span>
                        <button id="manualSendButton" class="button button-primary button-small" type="button">发送并回答</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="answerPane" class="workspace-pane answer-pane" aria-labelledby="answerTitle">
            <div class="answer-toolbar">
                <div class="answer-context">
                    <div class="heading-line">
                        <h2 id="answerTitle">AI 辅助回答</h2>
                        <span id="answerStatusBadge" class="answer-status status-idle">等待问题</span>
                    </div>
                    <p id="selectedQuestionText">请先从左侧选择一个问题</p>
                </div>
                <div class="answer-actions">
                    <button id="copyAnswerButton" class="button button-quiet" type="button" disabled>复制回答</button>
                    <button id="outputButton" class="button button-primary" type="button" disabled title="快捷键 F">生成回答</button>
                </div>
            </div>

            <div class="output-container" id="outputText" aria-live="polite">
                <div class="empty-state" id="answerEmptyState">
                    <span class="empty-state-icon" aria-hidden="true">✦</span>
                    <h3>选择一个面试问题</h3>
                    <p>左侧转写完成后，选中问题并点击“生成回答”。</p>
                </div>
            </div>
        </section>
    </div>
</main>

<script src="privacy_mode.js"></script>
<script type="module" src="scripts.js"></script>
</body>

</html>
