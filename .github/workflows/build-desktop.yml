name: Build desktop releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm ci --prefix desktop

      - name: Build unsigned Windows artifacts
        run: npm --prefix desktop run dist:win:unsigned

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meeting-monster-windows
          path: desktop/release/*.exe
          if-no-files-found: error

  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm ci --prefix desktop

      - name: Build unsigned macOS artifacts
        run: npm --prefix desktop run dist:mac:unsigned

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meeting-monster-macos
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s globstar nullglob
          assets=(release/**/*.exe release/**/*.dmg release/**/*.zip)
          gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Meeting-Monster $GITHUB_REF_NAME" \
            --generate-notes
