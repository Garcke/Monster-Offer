name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  server-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -r server/requirements.txt
      - run: python -m unittest discover -s tests/server -p "test_*.py" -v

  windows-desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - working-directory: desktop
        run: npm ci
      - working-directory: desktop
        run: npm run desktop-test
      - working-directory: desktop
        run: npm run dist:win:unsigned
      - working-directory: desktop
        run: npm run audit:package
      - uses: actions/upload-artifact@v4
        with:
          name: meeting-monster-windows-unsigned
          path: desktop/release/*.exe

  macos-desktop:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - working-directory: desktop
        run: npm ci
      - working-directory: desktop
        run: npm run desktop-test
      - working-directory: desktop
        run: npm run dist:mac:unsigned
      - uses: actions/upload-artifact@v4
        with:
          name: meeting-monster-macos-unsigned
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
